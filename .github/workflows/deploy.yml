name: Deploy Meter Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Deploy to pm-01
        run: |
          gcloud compute ssh rd@pm-01 \
            --zone=asia-east1-b \
            --project=power-meter-278701 \
            -- bash /home/rd/deploy.sh

      - name: Deploy to pm-02
        run: |
          gcloud compute ssh rd@pm-02 \
            --zone=asia-east1-b \
            --project=power-meter-278701 \
            -- bash /home/rd/deploy.sh
