steps:
  # 部署到 pm-01
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-pm-01'
    args:
      - 'compute'
      - 'ssh'
      - 'rd@pm-01'
      - '--zone=asia-east1-b'
      - '--project=power-meter-278701'
      - '--'
      - 'bash /home/rd/deploy.sh'

  # 部署到 pm-02
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-pm-02'
    args:
      - 'compute'
      - 'ssh'
      - 'rd@pm-02'
      - '--zone=asia-east1-b'
      - '--project=power-meter-278701'
      - '--'
      - 'bash /home/rd/deploy.sh'

options:
  logging: CLOUD_LOGGING_ONLY
