        echo "Pulling latest code from GitHub..."
        if git pull origin main; then
          echo "Git pull completed successfully"
          echo "Current commit: `git log --oneline -1`"
        else
          echo "Git pull failed"
          exit 1
        fi
        echo "Stopping old server process..."
        sudo pkill -9 -f "python3 server.py" || true
        sleep 1
        echo "Starting new server process..."
        nohup sudo python3 server.py > /tmp/server.log 2>&1 &
        sleep 3
        if sudo pgrep -f "python3 server.py" > /dev/null; then
          echo "✓ Server is running successfully"
        else
          echo "✗ Server failed to start"
          cat /tmp/server.log 2>/dev/null || echo "No log file"
          exit 1
        fi
        echo "=== Deployment to pm-02 completed ==="

options:
  logging: CLOUD_LOGGING_ONLY
